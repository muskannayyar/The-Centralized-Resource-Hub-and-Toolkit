<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f3ef;color:#1a1a2e;min-height:100vh;font-size:14px}
:root{--navy:#0d1b2a;--navy2:#1a2f45;--gold:#b8963e;--gold2:#d4ae60;--green:#0f9b6e;--muted:#64748b;--border:#e0ddd5;--bg:#f4f3ef;--w:#fff;--r:12px}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
/* LOGIN */
.lw{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:2rem}
.llogo h1{font-family:'Playfair Display',serif;font-size:26px;color:#fff;letter-spacing:-.5px;text-align:center}
.llogo p{color:#8fa3bc;font-size:13px;margin-top:5px;font-weight:300;text-align:center}
.llogo .lbadge{display:inline-block;margin:8px auto 0;padding:3px 10px;border:1px solid #334155;border-radius:20px;font-size:10px;color:#64748b;letter-spacing:.5px}
.lrow{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:780px;width:100%;margin-top:2.5rem}
.lcard{background:#162032;border:1px solid #253347;border-radius:16px;padding:1.75rem;cursor:pointer;transition:all .2s}
.lcard:hover{border-color:var(--gold);transform:translateY(-2px)}
.lcard-ico{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:1rem}
.lcard.hr .lcard-ico{background:#0f2044}
.lcard.ir .lcard-ico{background:#0c2d20}
.lcard h3{font-family:'Playfair Display',serif;font-size:17px;color:#fff;margin-bottom:.35rem}
.lcard .lsub{font-size:12px;color:#8fa3bc;font-weight:300;line-height:1.6;margin-bottom:.875rem}
.lcard ul{list-style:none}
.lcard ul li{font-size:12px;color:#8fa3bc;font-weight:300;padding:3px 0 3px 13px;position:relative}
.lcard ul li::before{content:'·';position:absolute;left:2px;color:var(--gold)}
.lcard.ir ul li::before{color:var(--green)}
.lbtn{display:block;margin-top:1.125rem;padding:.6rem;border-radius:8px;font-weight:600;font-size:13px;border:none;cursor:pointer;width:100%;transition:background .2s}
.lbtn.hr{background:var(--gold);color:var(--navy)}
.lbtn.ir{background:var(--green);color:#fff}
/* SHELL */
.app{display:flex;flex-direction:column;min-height:100vh}
.topnav{background:var(--navy);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #253347}
.brand{font-family:'Playfair Display',serif;font-size:15px;color:#fff;display:flex;align-items:center;gap:.5rem}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.nav-r{display:flex;align-items:center;gap:.625rem}
.rbadge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.rb-hr{background:#132240;color:#6fa3d4}
.rb-ir{background:#0c2d20;color:#5dd4a8}
.ava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px}
.ava-hr{background:var(--gold);color:var(--navy)}
.ava-ir{background:var(--green);color:#fff}
.bso{background:none;border:1px solid #253347;color:#8fa3bc;padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer}
.bso:hover{color:#fff;border-color:#8fa3bc}
/* PROFILE SWITCHER */
.psw{display:flex;align-items:center;gap:.35rem;background:#0f2035;border:1px solid #253347;border-radius:20px;padding:3px}
.psw-btn{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:500;border:none;cursor:pointer;transition:all .2s;background:none;color:#8fa3bc}
.psw-btn.active{background:var(--green);color:#fff}
/* TABS */
.tabbar{background:var(--w);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;overflow-x:auto}
.tabbar::-webkit-scrollbar{height:2px}
.tb{padding:.75rem 1.125rem;font-size:13px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:.35rem;transition:all .15s}
.tb.ahr{color:var(--navy);border-bottom-color:var(--gold)}
.tb.air{color:#0a7a56;border-bottom-color:var(--green)}
.tb:hover:not(.ahr):not(.air){color:var(--navy)}
/* MAIN */
.main{flex:1;padding:1.5rem;max-width:1180px;margin:0 auto;width:100%}
.ph{margin-bottom:1.25rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.ph h2{font-family:'Playfair Display',serif;font-size:19px;color:var(--navy)}
.ph p{color:var(--muted);font-size:12px;margin-top:3px;font-weight:300}
/* BTNS */
.btn{padding:.5rem 1rem;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:.35rem;white-space:nowrap}
.bn{background:var(--navy);color:#fff}.bn:hover{background:var(--navy2)}
.bg{background:var(--green);color:#fff}.bg:hover{background:#0a7a56}
.bo{background:var(--w);color:var(--navy);border:1px solid var(--border)}.bo:hover{border-color:var(--navy)}
.bgo{background:var(--gold);color:#fff}.bgo:hover{background:var(--gold2)}
/* TAGS */
.tag{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block}
.tg{background:#f3f2ee;color:#64748b}.tb2{background:#eff6ff;color:#1d4ed8}.ta{background:#fffbeb;color:#92400e}.tgn{background:#f0fdf4;color:#166534}.tp{background:#fdf4ff;color:#7e22ce}.tr{background:#fef2f2;color:#991b1b}.tn{background:#f0f9ff;color:#0369a1}
/* CARD */
.card{background:var(--w);border:1px solid var(--border);border-radius:var(--r)}
/* STATS */
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.25rem}
.sb{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:.875rem}
.sb .sv{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--navy)}
.sb .sl{font-size:11px;color:var(--muted);font-weight:300;margin-top:2px}
.sb .sc{font-size:11px;color:var(--green);font-weight:500;margin-top:2px}
/* SEARCH */
.sbar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.sbar input{flex:1;min-width:150px;padding:.5rem .875rem;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--navy);background:var(--w)}
.sbar input:focus{outline:none;border-color:var(--gold)}
.sbar select{padding:.5rem .875rem;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--navy);background:var(--w);cursor:pointer}
/* CAND */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:.875rem}
.ccard{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:1.125rem;transition:all .2s;cursor:pointer}
.ccard:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);transform:translateY(-1px)}
.ctx{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.cav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.cn{font-size:14px;font-weight:600;color:var(--navy)}
.cr{font-size:12px;color:var(--muted);font-weight:300;margin-top:1px}
.tr2{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.625rem}
.skr{display:flex;gap:.25rem;flex-wrap:wrap;margin-bottom:.625rem}
.stag{background:#f4f3ef;border:1px solid var(--border);color:#475569;font-size:11px;padding:2px 6px;border-radius:4px}
.cf{display:flex;justify-content:space-between;align-items:center;padding-top:.625rem;border-top:1px solid var(--border)}
.av{font-size:11px;color:var(--muted);font-weight:300;display:flex;align-items:center;gap:4px}
.adot{width:6px;height:6px;border-radius:50%}
.ado{background:var(--green)}.adp{background:#f59e0b}
/* MY PROFILE */
.pl{display:grid;grid-template-columns:260px 1fr;gap:1.125rem;align-items:start}
.pside{display:flex;flex-direction:column;gap:.75rem}
.pavc{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:1.375rem;text-align:center}
.pav{width:72px;height:72px;border-radius:50%;background:#f0fdf4;color:#0f9b6e;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;margin:0 auto .75rem}
.pav2{background:#eff6ff;color:#1d4ed8}
.pavc h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--navy)}
.pavc .pt{font-size:12px;color:var(--muted);font-weight:300;margin-top:2px}
.pavc .pco{font-size:13px;color:var(--navy);font-weight:500;margin-top:3px}
.pbar-wrap{display:flex;align-items:center;gap:6px;margin-top:.75rem}
.pbar{background:#f0ede4;border-radius:99px;height:4px;flex:1;overflow:hidden}
.pfill{background:var(--gold);height:100%;border-radius:99px}
.plbl{font-size:11px;color:var(--muted);white-space:nowrap}
.pstats{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.75rem}
.pstat{background:#f8f7f3;border-radius:8px;padding:.5rem;text-align:center}
.psv{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--navy)}
.psl{font-size:10px;color:var(--muted);font-weight:300;margin-top:1px}
.pacts{display:flex;flex-direction:column;gap:.35rem;margin-top:.75rem}
.psecs{display:flex;flex-direction:column;gap:.75rem}
.psec{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:1.125rem}
.psh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.psh h4{font-size:13px;font-weight:600;color:var(--navy)}
.ebtn{font-size:11px;color:var(--gold);background:none;border:none;cursor:pointer;font-weight:500}
.ei{padding:.5rem 0;border-bottom:1px solid var(--border)}
.ei:last-child{border-bottom:none;padding-bottom:0}
.ei h5{font-size:13px;font-weight:500;color:var(--navy)}
.ei p{font-size:12px;color:var(--muted);font-weight:300;margin-top:1px}
.ei .ep{font-size:11px;color:var(--muted);margin-top:3px}
/* EDIT MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:300;padding:1rem}
.md{background:var(--w);border-radius:16px;padding:1.75rem;max-width:620px;width:100%;max-height:90vh;overflow-y:auto}
.md::-webkit-scrollbar{width:3px}
.md::-webkit-scrollbar-thumb{background:var(--border)}
.md-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.md-hd h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--navy)}
.mdc{font-size:18px;background:none;border:none;cursor:pointer;color:var(--muted)}
.ff{margin-bottom:.875rem}
.ff label{display:block;font-size:10px;font-weight:600;color:var(--navy);margin-bottom:.3rem;letter-spacing:.4px;text-transform:uppercase}
.ff input,.ff select,.ff textarea{width:100%;padding:.5rem .875rem;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--navy);background:var(--w);resize:vertical}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--gold)}
.ff textarea{min-height:75px;font-weight:300;line-height:1.6}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.skill-chips{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.35rem}
.schip{background:#f4f3ef;border:1px solid var(--border);color:#334155;font-size:12px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px}
.schip-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;line-height:1;padding:0}
.schip-add{background:none;border:1px dashed var(--border);color:var(--muted);font-size:12px;padding:3px 10px;border-radius:20px;cursor:pointer}
.schip-add:hover{border-color:var(--green);color:var(--green)}
.avail-opts{display:flex;gap:.5rem;margin-top:.35rem}
.aopt{padding:.4rem .875rem;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:var(--w);color:var(--muted);transition:all .15s}
.aopt.sel{background:var(--navy);color:#fff;border-color:var(--navy)}
/* CASE STUDIES */
.csgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1rem}
.cscard{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;transition:all .2s;cursor:pointer}
.cscard:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);transform:translateY(-1px)}
.cs-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem}
.cs-co{font-size:12px;color:var(--muted);font-weight:300;margin-top:2px}
.cs-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--navy);margin:.5rem 0 .375rem;line-height:1.35}
.cs-body{font-size:12px;color:#475569;font-weight:300;line-height:1.65;margin-bottom:.875rem}
.cs-lessons{background:#f8f7f3;border-radius:8px;padding:.75rem;margin-bottom:.875rem}
.cs-lessons .cl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:.35rem}
.cs-lessons ul{list-style:none}
.cs-lessons ul li{font-size:12px;color:var(--navy);font-weight:300;padding:2px 0 2px 12px;position:relative;line-height:1.5}
.cs-lessons ul li::before{content:'→';position:absolute;left:0;color:var(--gold);font-size:10px;top:4px}
.cs-foot{display:flex;justify-content:space-between;align-items:center;padding-top:.75rem;border-top:1px solid var(--border)}
/* EVENTS */
.evc{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;display:flex;gap:.875rem;align-items:flex-start;margin-bottom:.5rem;transition:all .2s}
.evc:hover{box-shadow:0 2px 10px rgba(0,0,0,.05)}
.edt{background:var(--navy);color:#fff;border-radius:8px;padding:.5rem .625rem;text-align:center;min-width:48px;flex-shrink:0}
.em{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#8fa3bc}
.ed{font-size:17px;font-weight:600;font-family:'Playfair Display',serif;line-height:1.1}
.ei2{flex:1;min-width:0}
.ei2 h4{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:1px}
.ei2 p{font-size:12px;color:var(--muted);font-weight:300;line-height:1.5}
.em2{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.3rem}
.em2 span{font-size:11px;color:var(--muted)}
.breg{padding:.375rem .75rem;border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;background:var(--w);color:var(--navy);flex-shrink:0;align-self:center;transition:all .2s}
.breg:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.breg.jd{background:#f0fdf4;color:#166534;border-color:#bbf7d0;cursor:default}
/* NETWORK */
.ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.625rem;margin-top:.75rem}
.nc{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:1rem;text-align:center;transition:all .2s}
.nc:hover{box-shadow:0 2px 10px rgba(0,0,0,.06)}
.nca{width:44px;height:44px;border-radius:50%;margin:0 auto .5rem;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px}
.nc h5{font-size:12px;font-weight:500;color:var(--navy)}
.nc .nr{font-size:11px;color:var(--muted);font-weight:300;margin-top:1px}
.nc .nco{font-size:10px;color:var(--muted);margin-top:1px}
.bcn{margin-top:.5rem;padding:.35rem;border:1px solid var(--border);background:var(--w);border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;color:var(--navy);transition:all .2s;width:100%}
.bcn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.bcn.cn{background:#f0fdf4;color:#166534;border-color:#bbf7d0;cursor:default}
/* JOURNAL */
.jl{display:grid;grid-template-columns:225px 1fr;gap:1.125rem;align-items:start}
.jside{display:flex;flex-direction:column;gap:.4rem}
.je{background:var(--w);border:1px solid var(--border);border-radius:10px;padding:.75rem;cursor:pointer;transition:all .2s}
.je:hover{border-color:var(--green)}
.je.ja{border-color:var(--green);background:#f6fef9}
.je-d{font-size:10px;color:var(--muted);font-weight:300;margin-bottom:2px}
.je-t{font-size:12px;font-weight:500;color:var(--navy)}
.je-p{font-size:11px;color:var(--muted);font-weight:300;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.jm{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:1.375rem}
.jmh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.875rem;flex-wrap:wrap;gap:.5rem}
.jmh h4{font-family:'Playfair Display',serif;font-size:16px;color:var(--navy)}
.jmb{font-size:13px;color:#334155;font-weight:300;line-height:1.85;white-space:pre-line}
.jtg{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.875rem;padding-top:.875rem;border-top:1px solid var(--border)}
/* AI */
.aiw{display:grid;grid-template-columns:230px 1fr;gap:1.125rem;height:500px;align-items:start}
.aiside{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:1rem;height:100%;display:flex;flex-direction:column;gap:.625rem;overflow:hidden}
.aiside h4{font-size:12px;font-weight:600;color:var(--navy);letter-spacing:.3px}
.aiside p{font-size:11px;color:var(--muted);font-weight:300;line-height:1.5}
.sqlist{display:flex;flex-direction:column;gap:.35rem;overflow-y:auto;flex:1}
.sqlist::-webkit-scrollbar{width:3px}
.sqlist::-webkit-scrollbar-thumb{background:var(--border)}
.sq{padding:.45rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--navy);cursor:pointer;background:#f8f7f3;text-align:left;font-weight:400;line-height:1.45;transition:all .2s}
.sq:hover{border-color:var(--green);background:#f0fdf4;color:#0a7a56}
.aichat{background:var(--w);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;height:100%;overflow:hidden}
.aihead{padding:.875rem 1.125rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.625rem;flex-shrink:0}
.aiav{width:34px;height:34px;border-radius:50%;background:#0c2d20;display:flex;align-items:center;justify-content:center;font-size:15px}
.aihead h4{font-size:13px;font-weight:600;color:var(--navy)}
.aihead p{font-size:11px;color:var(--muted);font-weight:300}
.chatmsgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.chatmsgs::-webkit-scrollbar{width:3px}
.chatmsgs::-webkit-scrollbar-thumb{background:var(--border)}
.msg{display:flex;gap:.5rem;align-items:flex-start}
.mbu{background:var(--navy);color:#fff;border-radius:10px 10px 0 10px;max-width:78%;padding:.55rem .875rem;font-size:13px;line-height:1.6;font-weight:300;margin-left:auto}
.mba{background:#f8f7f3;color:var(--navy);border-radius:0 10px 10px 10px;max-width:85%;padding:.55rem .875rem;font-size:13px;line-height:1.65;font-weight:300;white-space:pre-line}
.maiav{width:26px;height:26px;border-radius:50%;background:#0c2d20;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.typing{display:flex;gap:3px;padding:.4rem .7rem;background:#f8f7f3;border-radius:0 10px 10px 10px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:b .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.chatinput{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:.4rem;flex-shrink:0}
.chatinput input{flex:1;padding:.5rem .875rem;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--navy);background:#f8f7f3}
.chatinput input:focus{outline:none;border-color:var(--green);background:var(--w)}
.chatsend{padding:.5rem .875rem;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.chatsend:disabled{opacity:.35;cursor:default}
/* COURSES */
.clevel-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}

const CASE_STUDIES=[
  {id:1,cat:'Crisis IR',catTag:'tr',flag:'🇸🇬',company:'Singapore Airlines',year:2020,title:'Raising S$15.1bn During a Global Grounding: SIA\'s Rights Issue IR',body:'When COVID-19 grounded 96% of SIA\'s passenger fleet in April 2020, the airline executed one of Asia\'s largest-ever rights issues. The IR challenge was communicating an existential liquidity need without triggering a collapse in retail unitholder confidence — while simultaneously managing institutional lender expectations.',lessons:['Proactive scenario communication with institutional investors weeks before the public announcement prevented surprise and panic selling','Dedicated retail investor FAQ pages and plain-English explainers published alongside technical documents reduced AGM dissent significantly','Daily media briefings by the CFO and IR team maintained narrative control in a rapidly moving news cycle']},
  {id:2,cat:'Restructuring',catTag:'ta',flag:'🇸🇬',company:'CapitaLand Group',year:2021,title:'The CapitaLand Restructuring: IR Through a Complex Corporate Transformation',body:'CapitaLand\'s 2021 restructuring — delisting the parent and listing CapitaLand Investment (CLI) — required IR teams to manage simultaneous communication to parent shareholders, CLI institutional pre-registrants, and existing REIT unitholders across six countries. The transition compressed what typically takes 18 months into a 6-month investor education process.',lessons:['Segmented investor communication strategy — different decks and messaging for institutional pre-IPO investors vs existing retail shareholders — reduced confusion and maintained trust across all groups','Weekly IR updates to top-20 institutional shareholders through the restructuring period are now considered a global best practice benchmark for complex delistings']},
  {id:3,cat:'ESG Integration',catTag:'tgn',flag:'🇬🇧',company:'Unilever PLC',year:2022,title:'When ESG IR Backfired: Unilever\'s Overreach and the Activist Response',body:'Unilever\'s aggressive pivot to "purpose-led" IR messaging from 2020–2022 — placing ESG commitments at the centre of every investor communication — triggered a backlash from institutional investors led by Terry Smith of Fundsmith, who publicly criticised the company\'s focus on sustainability narratives over operational performance. The episode became a global case study in ESG IR calibration.',lessons:['ESG communication must be anchored in quantifiable financial impact — purpose without P&L connection is perceived as deflection by institutional investors','Activist pressure escalated directly from IR messaging failures: over-indexing on ESG without addressing margin underperformance created an opening for shareholder campaigns','The episode prompted NIRI and IRS UK to issue guidance on balancing ESG narrative with traditional financial communication']},
  {id:4,cat:'Activist Defence',catTag:'tp',flag:'🇸🇬',company:'Keppel Corporation',year:2023,title:'Keppel\'s Transformation Narrative: IR as Activist Deterrent',body:'Following years of conglomerate discount pressure and a failed Temasek partial offer, Keppel\'s IR team — led by VP Group Communications & IR — built a sustained multi-year transformation narrative that pre-empted activist intervention. The strategy centred on transparent asset divestment timelines, recurring investor day events, and direct C-suite accessibility to top-20 institutional holders.',lessons:['Proactive transformation IR — communicating what the company will become before activists define it — reduced conglomerate discount from 40% to under 20% over 24 months','Annual Investor Day with pre-distributed 50-page strategy packs and live CEO Q&A set a Singapore benchmark for transparency that analysts cited as directly affecting target price upgrades']},
  {id:5,cat:'Regulatory Change',catTag:'tn',flag:'🇮🇳',company:'Nifty 500 IR Community',year:2024,title:'India\'s SEBI LODR Reform: How Mandatory IRO Compliance Transformed a Market',body:'Following SEBI\'s amendment to the Listing Obligations and Disclosure Requirements (LODR) requiring all listed companies to appoint a Compliance Officer (de facto IRO) sitting no more than one level below the Board, 90% of Nifty 500 companies had dedicated IR professionals within 18 months. The reform created an overnight talent market for IR professionals and dramatically raised disclosure standards.',lessons:['Regulatory mandate is the single most effective catalyst for IR professionalisation — voluntary professionalization moves slowly, but compliance deadlines create immediate hiring demand','The reform created a talent shortage that lasted 3 years: companies with existing IR capability captured significant valuation premiums as institutional investors rewarded disclosure quality']},
  {id:6,cat:'Crisis IR',catTag:'tr',flag:'🇩🇪',company:'Wirecard AG',year:2020,title:'Wirecard: The Definitive IR Governance Failure',body:'The collapse of Wirecard — Germany\'s largest-ever corporate fraud — was enabled in part by an IR function that actively managed sell-side sceptics, threatened journalists with legal action, and produced investor materials that obscured rather than disclosed. When the Financial Times investigation confirmed €1.9bn in missing cash, the IR narrative collapsed alongside the company.',lessons:['IR professionals have a legal and ethical obligation to accurate disclosure — IR that actively manages negative information rather than disclosing it creates criminal liability, not just reputational damage','Sell-side analysts who raised concerns were met with aggressive IR counter-messaging — a pattern now cited in MAS and FCA guidance on whistleblower protections and disclosure obligations','The case directly informed SGX\'s strengthened material disclosure practice notes and the MAS\'s 2023 review of disclosure officer responsibilities']},
  {id:7,cat:'Capital Markets',catTag:'tb2',flag:'🇺🇸',company:'GameStop Corp',year:2021,title:'GameStop and the Retail IR Revolution: When the Internet Becomes Your Investor Base',body:'The 2021 GameStop short squeeze — driven by retail investors coordinating on Reddit\'s WallStreetBets — forced IR professionals globally to rethink retail investor communication. GameStop\'s IR team had no strategy for a 1,700% stock price move driven entirely by non-institutional actors, exposing the gap between traditional IR and modern retail investor engagement.',lessons:['C-suite executives are 3× more likely than IR practitioners to prioritise retail investor engagement — the GameStop event validated this gap and forced IR teams to build retail communication capabilities they never needed before','Social media monitoring is now a core IR competency: companies that tracked retail investor sentiment on Reddit and Discord had 48–72 hours of advance warning about the coordinated buying — IR teams with this monitoring avoided catastrophic communication missteps during the volatility']},
  {id:8,cat:'REIT IR',catTag:'ta',flag:'🇸🇬',company:'Mapletree Industrial Trust',year:2023,title:'Expanding Beyond Singapore: Cross-Border IR for APAC REITs',body:'Mapletree Industrial Trust\'s expansion into US data centres required a fundamental shift in IR strategy — from a Singapore retail unitholder base familiar with manufacturing parks to institutional investors in New York and London who needed to understand APAC REIT structures, tax treaty implications, and SGX listing norms. The IR team built a dedicated cross-border investor programme from scratch.',lessons:['Tailored investor education materials — explaining SGX trust structures, distribution yield mechanics, and FX hedging policy in terms familiar to US REIT investors — reduced deal friction significantly and improved analyst coverage quality from international research houses','The programme established a model for APAC-listed REITs seeking international institutional recognition that has since been adopted by Frasers Logistics and CapitaLand Ascendas REIT']},
];

function App(){
  const [screen,setScreen]=useState('login');
  const [role,setRole]=useState(null);
  const [tab,setTab]=useState('');
  const [pid,setPid]=useState(1);
  const [profiles,setProfiles]=useState(INIT_PROFILES);
  const [search,setSearch]=useState('');
  const [sector,setSector]=useState('All');
  const [avail,setAvail]=useState('All');
  const [events,setEvents]=useState(EVENTS);
  const [network,setNetwork]=useState(NETWORK);
  const [modal,setModal]=useState(null);
  const [editOpen,setEditOpen]=useState(false);
  const [aj,setAj]=useState(1);

  function login(r){setRole(r);setTab(r==='hr'?'talent':'profile');setScreen('app')}
  function logout(){setScreen('login');setRole(null)}
  const profile=profiles[pid];
  function saveProfile(p){setProfiles(pp=>({...pp,[pid]:p}))}

  const filtered=CANDIDATES.filter(c=>{
    const s=search.toLowerCase();
    const ms=!s||c.name.toLowerCase().includes(s)||c.role.toLowerCase().includes(s)||c.company.toLowerCase().includes(s)||c.skills.some(sk=>sk.toLowerCase().includes(s));
    return ms&&(sector==='All'||c.sector===sector)&&(avail==='All'||(avail==='Open'&&c.avail==='open')||(avail==='Passive'&&c.avail==='passive'));
  });

  const HR_TABS=[{id:'talent',l:'Talent Database',i:'👥'},{id:'post',l:'Post a Role',i:'📝'},{id:'tips',l:'Tips & Guidance',i:'💡'}];
  const IR_TABS=[{id:'profile',l:'My Profile',i:'👤'},{id:'network',l:'Networking & Events',i:'🌐'},{id:'cases',l:'Case Studies',i:'📰'},{id:'journal',l:'Learning Journal',i:'📔'},{id:'ai',l:'AI Assistant',i:'🤖'},{id:'certs',l:'Courses & Certs',i:'🏅'}];
  const TABS=role==='hr'?HR_TABS:IR_TABS;

  if(screen==='login')return h(Login,{onLogin:login});

  return h('div',{className:'app'},
    h('nav',{className:'topnav'},
      h('div',{className:'brand'},h('div',{className:'bdot'}),'SGListCos IR Platform'),
      h('div',{className:'nav-r'},
        role==='ir'&&h('div',{className:'psw'},
          h('button',{className:`psw-btn${pid===1?' active':''}`,onClick:()=>setPid(1)},'Rachel Phua'),
          h('button',{className:`psw-btn${pid===2?' active':''}`,onClick:()=>setPid(2)},'Marcus Tan')
        ),
        h('span',{className:`rbadge ${role==='hr'?'rb-hr':'rb-ir'}`},role==='hr'?'HR / Company':'IR Professional'),
        h('div',{className:`ava ${role==='hr'?'ava-hr':'ava-ir'}`},role==='hr'?'HR':profile.init),
        h('button',{className:'bso',onClick:logout},'Sign out')
      )
    ),
    h('div',{className:'tabbar'},TABS.map(t=>h('button',{key:t.id,className:`tb${tab===t.id?' '+(role==='hr'?'ahr':'air'):''}`,onClick:()=>setTab(t.id)},h('span',null,t.i),' ',t.l))),
    h('div',{className:'main'},
      tab==='talent'&&h(TalentTab,{filtered,search,setSearch,sector,setSector,avail,setAvail,setModal}),
      tab==='post'&&h(PostRoleTab,null),
      tab==='tips'&&h(TipsTab,null),
      tab==='profile'&&h(ProfileTab,{profile,onEdit:()=>setEditOpen(true)}),
      tab==='network'&&h(NetworkTab,{profile,events,setEvents,network,setNetwork}),
      tab==='cases'&&h(CasesTab,null),
      tab==='journal'&&h(JournalTab,{aj,setAj}),
      tab==='ai'&&h(AITab,null),
      tab==='certs'&&h(CertsTab,{profile})
    ),
    modal&&h(CandModal,{c:modal,onClose:()=>setModal(null)}),
    editOpen&&h(EditProfileModal,{profile,onSave:(p)=>{saveProfile(p);setEditOpen(false)},onClose:()=>setEditOpen(false)})
  );
}

function EditProfileModal({profile,onSave,onClose}){

  const [newSkill,setNewSkill]=useState('');
  function upd(k,v){setP(x=>({...x,[k]:v}))}
  function addSkill(){if(newSkill.trim()&&!p.skills.includes(newSkill.trim())){upd('skills',[...p.skills,newSkill.trim()]);setNewSkill('')}}
  function rmSkill(s){upd('skills',p.skills.filter(x=>x!==s))}
  const completion=Math.round(20+(p.bio?15:0)+(p.yoe?10:0)+(p.skills.length>3?15:p.skills.length*3)+(p.certs.length>0?15:0)+(p.education?10:0)+(p.linkedin?5:0));

    h('div',{className:'md',onClick:e=>e.stopPropagation()},
      h('div',{className:'md-hd'},h('h3',null,'Edit Profile'),h('button',{className:'mdc',onClick:onClose},'×')),
      h('div',{className:'f2'},
        h('div',{className:'ff'},h('label',null,'Full name'),h('input',{type:'text',value:p.name,onChange:e=>upd('name',e.target.value)})),
        h('div',{className:'ff'},h('label',null,'Current designation'),h('input',{type:'text',value:p.title,onChange:e=>upd('title',e.target.value)}))
      ),
      h('div',{className:'f2'},

        h('div',{className:'ff'},h('label',null,'Sector'),h('select',{value:p.sector,onChange:e=>upd('sector',e.target.value)},...['Banking','REIT','Industrial','Conglomerate','Technology','Healthcare','Consumer','Energy'].map(s=>h('option',{key:s,value:s},s))))

      ),
      h('div',{className:'ff'},h('label',null,'Professional bio'),h('textarea',{value:p.bio,onChange:e=>upd('bio',e.target.value),placeholder:'Describe your IR experience, sector expertise, and career goals...'})),
      h('div',{className:'ff'},

        h('div',{className:'skill-chips'},

          h('div',{style:{display:'flex',gap:4,marginTop:4}},
            h('input',{type:'text',placeholder:'Add skill...',value:newSkill,onChange:e=>setNewSkill(e.target.value),onKeyDown:e=>e.key==='Enter'&&addSkill(),style:{flex:1,padding:'3px 8px',border:'1px solid var(--border)',borderRadius:8,fontSize:12}}),
            h('button',{className:'schip-add',onClick:addSkill},'+ Add')

      h('div',{className:'ff'},h('label',null,'Certifications held (one per line)'),h('textarea',{style:{minHeight:60},value:p.certs.join('\n'),onChange:e=>upd('certs',e.target.value.split('\n').filter(x=>x.trim())),placeholder:'e.g. IRC (NIRI, 2025)\nIRS Certificate (UK, 2024)'})),

          h('button',{className:`aopt${p.avail==='passive'?' sel':''}`,onClick:()=>upd('avail','passive')},'Passively looking'),
          h('button',{className:`aopt${p.avail==='closed'?' sel':''}`,onClick:()=>upd('avail','closed')},'Not looking')

function AITab(){
  const init=[{role:'assistant',content:'Hello — I\'m your IR regulatory assistant, trained on Singapore\'s SGX listing rules, the Securities and Futures Act (SFA), Companies Act, MAS guidelines, and global IR best practices.\n\nAsk me anything about your disclosure obligations, SGX compliance, quiet periods, or how Singapore compares to other markets. Use the suggested questions on the left to get started.'}];
  const [messages,setMessages]=useState(init);
  const [inp,setInp]=useState('');
  const [loading,setLoading]=useState(false);
  const chatRef=useRef(null);
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[messages,loading]);

  async function send(txt){
    if(!txt.trim()||loading)return;
    setInp('');
    const next=[...messages,{role:'user',content:txt.trim()}];
    setMessages(next);
    setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:AI_SYS,messages:next.map(m=>({role:m.role,content:m.content}))})
      });
      const data=await res.json();
      const reply=(data.content||[]).find(b=>b.type==='text')?.text||'Unable to retrieve a response. Please try again.';
      setMessages([...next,{role:'assistant',content:reply}]);
    }catch(e){
      setMessages([...next,{role:'assistant',content:'Connection error. Please try again in a moment.'}]);
    }
    setLoading(false);
  }

  return h('div',null,
    h('div',{className:'ph'},h('div',null,h('h2',null,'AI Assistant'),h('p',null,'Ask questions about Singapore IR law, SGX regulations, and global best practices.'))),
    h('div',{className:'aiw'},
      h('div',{className:'aiside'},
        h('h4',null,'Suggested questions'),
        h('p',null,'Click any question to send it directly to the assistant.'),
        h('div',{className:'sqlist'},SEED_QS.map((q,i)=>h('button',{key:i,className:'sq',onClick:()=>send(q)},q)))
      ),
      h('div',{className:'aichat'},
        h('div',{className:'aihead'},h('div',{className:'aiav'},'🤖'),h('div',null,h('h4',null,'IR Regulatory Assistant'),h('p',null,'SGX rules · SFA · Companies Act · Global IR'))),
        h('div',{className:'chatmsgs',ref:chatRef},
          messages.map((m,i)=>h('div',{key:i,className:'msg',style:{flexDirection:m.role==='user'?'row-reverse':'row'}},
            m.role==='assistant'&&h('div',{className:'maiav'},'🤖'),
            h('div',{className:m.role==='user'?'mbu':'mba'},m.content)
          )),
          loading&&h('div',{className:'msg'},h('div',{className:'maiav'},'🤖'),h('div',{className:'typing'},h('span'),h('span'),h('span')))
        ),
        h('div',{className:'chatinput'},
          h('input',{type:'text',placeholder:'Ask about SGX rules, disclosure obligations, IR best practices...',value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>e.key==='Enter'&&!loading&&send(inp),disabled:loading}),
          h('button',{className:'chatsend',onClick:()=>send(inp),disabled:loading||!inp.trim()},'Send')
        )
      )
    )
  );
}
